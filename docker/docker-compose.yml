services:
  service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../data:/app/data
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      YKSPRITE_API_TARGET: http://service:3000
    ports:
      - "5173:5173"
    depends_on:
      - service
